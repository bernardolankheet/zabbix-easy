site_name: Zabbix Easy Report
repo_url: https://github.com/bernardolankheet/zabbix-easy
nav:
  - Home: index.md
  - Novidades: changes.md
  - Instalação: instalacao.md
  - API: api.md
  - Docker: docker.md
  - Utilização: utilizacao.md
  - Contribuição: contribuicao.md
theme:
  name: material
  language: pt
plugins:
  - search
  - i18n:
      languages:
        - locale: pt
          name: "Português (Brasil)"
          default: true
        - locale: en
          name: "English"
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
extra_javascript:
  - https://unpkg.com/mermaid@9/dist/mermaid.min.js
  - js/mermaid-init.js
  - js/lang-switch.js
extra_css:
  - css/lang-switch.css
