apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "zabbix-easy.labels" . | nindent 4 }}
  {{- with .Values.metadata.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.spec.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.postgres.enabled }}
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z {{ include "zabbix-easy.postgresHost" . }} 5432; do
            echo "Aguardando PostgreSQL em {{ include "zabbix-easy.postgresHost" . }}:5432...";
            sleep 3;
          done
          echo "PostgreSQL disponivel."
      {{- end }}
      containers:
      - name: {{ .Release.Name }}
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- if .Values.container.args }}
        args:
          {{- toYaml .Values.container.args | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.port }}
          protocol: TCP
        {{- if .Values.spec.resources }}
        resources:
          {{- toYaml .Values.spec.resources | nindent 10 }}
        {{- end }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        {{- include "zabbix-easy.env" . | indent 8 }}
