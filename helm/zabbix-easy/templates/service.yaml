apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "zabbix-easy.labels" . | nindent 4 }}
  {{- if .Values.service.annotations }}
  annotations:
    {{- toYaml .Values.service.annotations | nindent 4 }}
  {{- end }}
spec:
  selector:
    app: {{ .Release.Name }}
  {{- with .Values.service.spec }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
