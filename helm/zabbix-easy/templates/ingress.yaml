{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "zabbix-easy.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  rules:
  {{- range .Values.ingress.rules }}
  - host: {{ .host }}.{{ .domain }}
    http:
      paths:
      - path: {{ .path }}
        pathType: Prefix
        backend:
          service:
            name: {{ $.Release.Name }}
            port:
              number: {{ $.Values.port }}
  {{- end }}
  {{- if .Values.ingress.tlsenabled }}
  tls:
  {{- range .Values.ingress.tls }}
  - hosts:
    - {{ .host }}.{{ .domain }}
    secretName: tls-{{ .cert }}
  {{- end }}
  {{- end }}
{{- end }}
