<!DOCTYPE html>
<html lang="pt-BR" id="html-root">
<head>
    <meta charset="UTF-8">
    <title>ZBX-Easy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="show-login">
    <div class="container full-width">
        <div class="page-header">
            <h1 style="display:flex;align-items:center;gap:8px;">
                <img src="/static/favicon.svg" alt="" width="22" height="22" style="display:block;flex-shrink:0;">
                ZBX-Easy
            </h1>
            <div class="lang-switcher">
                <select id="lang-select" aria-label="Language / Idioma">
                    <option value="pt_BR">🇧🇷 PT</option>
                    <option value="en_US">🇺🇸 EN</option>
                </select>
            </div>
        </div>
        <form id="zabbix-form">
            <label for="zabbix_url" data-i18n="label_url">URL do Zabbix:</label>
            <input type="text" id="zabbix_url" name="zabbix_url" data-i18n-placeholder="placeholder_url" placeholder="http://zabbix.com ou http://IP" required>
            <label for="zabbix_token" data-i18n="label_token">Token de Autenticação:</label>
            <div class="password-wrapper">
                <input type="password" id="zabbix_token" name="zabbix_token" data-i18n-placeholder="placeholder_token" placeholder="Token API" required>
                <span id="toggle-token" class="toggle-eye" tabindex="0" data-i18n-aria="aria_toggle_token" aria-label="Mostrar/Ocultar token">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
                </span>
            </div>
            <button type="submit" data-i18n="btn_generate">Gerar Relatório</button>
            <div class="db-controls">
                <div class="db-controls-header">
                    <span class="db-controls-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                        <span data-i18n="title_saved_reports">Relatórios Salvos</span>
                    </span>
                    <!-- btn-load-db removed: automatic loading on page load is used instead -->
                </div>
                <div class="db-controls-row">
                    <select id="reportSelect" class="db-select"><option value="" data-i18n="option_no_report">-- nenhum relatório carregado --</option></select>
                    <div class="db-actions">
                        <button type="button" id="btn-open-db" class="db-btn db-btn-primary" data-i18n-title="title_open_report" title="Abrir relatório selecionado">
                            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                            <span data-i18n="btn_open">Abrir</span>
                        </button>
                        <button type="button" id="btn-delete-db" class="db-btn db-btn-danger" data-i18n-title="title_delete_report" title="Excluir relatório selecionado">
                            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                            <span data-i18n="btn_delete">Excluir</span>
                        </button>
                        <button type="button" id="btn-delete-all-db" class="db-btn db-btn-danger-ghost" data-i18n-title="title_delete_all" title="Excluir todos os relatórios do banco">
                            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                            <span data-i18n="btn_delete_all">Excluir Todos</span>
                        </button>
                    </div>
                </div>
            </div>
        </form>
        <div id="progress-bar" class="progress-bar" style="display:none;">
            <div class="progress"></div>
            <span id="progress-text" data-i18n="generating">Gerando relatório...</span>
        </div>
        <div id="report-area" class="report-area" style="display:none;"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
