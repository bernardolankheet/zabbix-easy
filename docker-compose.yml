version: '3.8'
services:
  go-app:
    build: .
    #image: bernardolankheet/zabbix-easy:latest
    container_name: go-zabbix-app
    ports:
      - "8080:8080"
    environment:
      # Descomente as variáveis abaixo para habilitar persistência de relatórios no PostgreSQL.
      # Para subir com banco: docker compose --profile db up --build -d
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=zabbix_report
      - MAX_CCONCURRENT=3
      - API_TIMEOUT_SECONDS=20   # se o Zabbix for mais lento
      - ZABBIX_SERVER_HOSTID=10084 # HostID do zabbix Server, utliza para pegar os dados de performance.
      #- ZABBIX_SERVER_HOSTID=23423
      #- ZABBIX_SERVER_HOSTID=19882   
      - APP_DEBUG=true # true ou false Habilita logs de debug da API do Zabbix
      - CHECKTRENDTIME=15d # Tempo para verificar tendência de dados, não utilize history (<7d), leva em consideracão o valor que é definido no zabbix para Trends ou o Valor Utilizado no Particionamento do banco de dados.
    restart: unless-stopped
  postgres:
    profiles: ["db"]
    image: postgres:18-alpine
    container_name: go-zabbix-postgres
    environment:
      POSTGRES_DB: zabbix_report
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d zabbix_report"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
    name: go_zabbix_postgres_data